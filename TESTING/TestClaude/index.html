<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Finals Random Loadout Generator</title>
    <meta name="description" content="Generate random punishment loadouts for The Finals game.">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flexStyle">
    <header class="headerSection">
        <div class="container">
            <img src="images/the-finals.png" alt="The Finals Logo" class="finals-logo" style="max-width: 200px; height: auto;">
            <div class="header-with-crossbones">
                <img src="images/punishment.png" alt="Crossbones" class="crossbones">
                <h1 class="mainTitle blood-red">Generate Your Punishment</h1>
                <img src="images/punishment.png" alt="Crossbones" class="crossbones">
            </div>
            <p class="headerSubtext">The Ultimate Test: Can You Survive This Loadout?</p>
        </div>
    </header>
    <main class="mainConetnt">
        <div class="container">
            <div class="buttons">
                <div class="btnRow">
                    <button id="randomLoadoutButton" class="random outlineBtnStyle skeleton-overlay" title="Good luck. You'll need it." style="display: flex; align-items: center; justify-content: center; padding: 0.5rem 1rem; font-size: 1rem; line-height: 1.5;">Generate Your Punishment</button>
                </div>
            </div>        
            <div id="output">
                <div class="failure-stamp">Failure Guaranteed</div>
            </div>
        </div>
    </main>
    <footer class="footerSection">
        <div class="container">
            <div class="footer">
                <span class="left">&copy; 2025 TheFinalsLoadout.com | <a href="#">Legal Disclaimer</a></span>
                <span class="separator"> | </span>
                <span class="center">Randomly generated for maximum chaos&trade;. Play responsibly!</span>
                <span class="separator"> | </span>
                <span class="right">1-800-FAT-MOMS Production</span>
            </div>
            <a href="../index.html" class="home-button">I've Had Enough, Take Me Home</a>
        </div>
    </footer>
    <script src="app.js"></script>
</body>
</html>
