<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadout Spinner</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flexStyle">
    <header class="headerSection">
        <h1 class="mainTitle">Loadout Spinner</h1>
        <p>Select your class and spin to get your loadout!</p>
    </header>

    <main class="mainContent">
        <!-- Step 1: Class Selection -->
        <div class="step" id="classSelection">
            <h2>Step 1: Choose Your Class</h2>
            <div class="btnRow">
                <button class="class-button outlineCircleBtn" data-class="Light" id="lightLoadoutButton">
                    <span>Light</span>
                </button>
                <button class="class-button outlineCircleBtn" data-class="Medium" id="mediumLoadoutButton">
                    <span>Medium</span>
                </button>
                <button class="class-button outlineCircleBtn" data-class="Heavy" id="heavyLoadoutButton">
                    <span>Heavy</span>
                </button>
            </div>
            <button class="class-button outlineBtnStyle" data-class="random" id="randomLoadoutButton">
                Random Contestant
            </button>
        </div>

        <!-- Step 2: Spin Selection -->
        <div class="step disabled" id="spinSelection">
            <h2>Step 2: Choose Spin Count</h2>
            <div class="spin-button-container">
                <button class="spin-button spin-count-btn" data-spins="1">1</button>
                <button class="spin-button spin-count-btn" data-spins="2">2</button>
                <button class="spin-button spin-count-btn" data-spins="3">3</button>
                <button class="spin-button spin-count-btn" data-spins="4">4</button>
                <button class="spin-button spin-count-btn" data-spins="5">5</button>
            </div>
        </div>

        <!-- Spinner Output -->
        <div id="output" class="spinner-output">
            <!-- Dynamic content will be inserted here -->
        </div>

        <!-- Control Buttons -->
        <div class="control-buttons">
            <button id="copyLoadoutButton" class="copy-button">
                Copy Loadout
            </button>
            <button id="punishmentLoadoutButton" class="punishment-button">
                <img src="images/punishment.webp"=skukk-icon">
                Punishment Mode
                <img src="images/punishment.webp"=skukk-icon">
            </button>
        </div>
    </main>

    <footer class="footerSection">
        <div class="container">
            <div class="footerRow">
                <p>© 2025 Loadout Spinner</p>
                <p>Created with ❤️ for the community</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
