<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadout Spinner</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Loadout Spinner</h1>
        <p>Select your class and number of spins, then press spin!</p>
        <div class="controls">
            <label for="classSelect">Class:</label>
            <select id="classSelect">
                <option value="random">Random</option>
                <option value="light">Light</option>
                <option value="medium">Medium</option>
                <option value="heavy">Heavy</option>
            </select>
            <label for="spinCount">Spins:</label>
            <input type="number" id="spinCount" min="1" max="5" value="1">
            <button id="spinButton">Spin</button>
            <button id="copyButton">Copy Loadout</button>
        </div>
        <div class="spinner-area">
            <div class="spinner-column"><div class="spinner" id="classSpinner"></div></div>
            <div class="spinner-column"><div class="spinner" id="weaponSpinner"></div></div>
            <div class="spinner-column"><div class="spinner" id="specializationSpinner"></div></div>
            <div class="spinner-column"><div class="spinner" id="gadget1Spinner"></div></div>
            <div class="spinner-column"><div class="spinner" id="gadget2Spinner"></div></div>
            <div class="spinner-column"><div class="spinner" id="gadget3Spinner"></div></div>
        </div>
    </div>
</body>
</html>
