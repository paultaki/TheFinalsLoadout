<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadout Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/the-finals.png" alt="The Finals Logo" class="finals-logo">
        <h1>Random Loadout Generator</h1>
    </header>
    <main>
        <div class="buttons">
            <button id="randomLoadoutButton">Random Class and Loadout</button>
            <button id="lightLoadoutButton">Light Loadout</button>
            <button id="mediumLoadoutButton">Medium Loadout</button>
            <button id="heavyLoadoutButton">Heavy Loadout</button>
        </div>
        <div id="output"></div>
    </main>
    <footer>
        <p>© 2025 Loadout Generator</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
