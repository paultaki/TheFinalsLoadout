<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Finals Loadout Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>The Finals Loadout Generator</h1>
    <p>Generate random loadouts for Light, Medium, or Heavy builds!</p>
  </header>
  <main>
    <div class="buttons">
      <button class="random-loadout" onclick="generateLoadout('Random')">Random Class and Loadout</button>
      <button onclick="generateLightLoadout()">Light Loadout</button>
      <button onclick="generateMediumLoadout()">Medium Loadout</button>
      <button onclick="generateHeavyLoadout()">Heavy Loadout</button>
    </div>
    <div id="output"></div>
  </main>
  <footer>
    <p>© 2025 TheFinalsLoadout.com</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
