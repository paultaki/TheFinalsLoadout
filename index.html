<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Finals Loadout Randomizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/the-finals.png" alt="The Finals Logo" class="logo">
        <h1>LOADOUT RANDOMIZER - <span class="season">SEASON 5 READY!</span></h1>
    </header>
    <main>
        <div class="randomize-box">
            <button id="randomizeClass" class="randomize-class-button">RANDOM CLASS AND LOADOUT</button>
        </div>
        <div class="class-buttons">
            <button id="lightButton" class="class-button light">LIGHT</button>
            <button id="mediumButton" class="class-button medium">MEDIUM</button>
            <button id="heavyButton" class="class-button heavy">HEAVY</button>
        </div>
        <div id="output" class="output-container"></div>
    </main>
    <footer>
        <p>&copy; 2025 TheFinalsLoadout.com</p>
        <p>1-800-FAT-MOMS Production</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
