<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Finals Loadout Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>The Finals Loadout Generator</h1>
        <p>Get a random loadout for Light, Medium, or Heavy Builds!</p>
    </header>
    <main>
        <div class="buttons">
            <button id="randomLoadoutButton" class="btn btn-random">Random Class and Loadout</button>
            <button id="lightLoadoutButton" class="btn">Light Loadout</button>
            <button id="mediumLoadoutButton" class="btn">Medium Loadout</button>
            <button id="heavyLoadoutButton" class="btn">Heavy Loadout</button>
        </div>
        <div id="output"></div>
    </main>
    <footer>
        <p>© 2025 TheFinalsLoadout.com</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
