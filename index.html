<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Finals Loadout Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>The Finals Loadout Generator</h1>
    <p>Spin to get your random loadout for Light, Medium, or Heavy Builds!</p>
  </header>
  <main>
    <div class="buttons">
      <button onclick="generateLightLoadout()">Spin for Light Loadout</button>
      <button onclick="generateMediumLoadout()">Spin for Medium Loadout</button>
      <button onclick="generateHeavyLoadout()">Spin for Heavy Loadout</button>
      <button onclick="generateLoadout(randomItem(Object.keys(loadouts)))">Spin for Random Loadout</button>
    </div>
    <div id="output"></div>
  </main>
  <footer>
    <p>© 2025 TheFinalsLoadout.com</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
