<!DOCTYPE html>
<html lang="en">
<head>

    <title>Loadout Generator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

        <h1>Random Loadout Generator</h1>

    <footer>
        <p>© 2025 Loadout Generator</p>
    </footer>
    <script src="./app.js"></script>

</html>
